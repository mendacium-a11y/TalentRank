services:
  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      - OLLAMA_HOST=http://ollama:11434
    depends_on:
      - ollama
    volumes:
      - ./talentrank.db:/app/talentrank.db

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    # We use a custom entrypoint to ensure the model is pulled when the container starts
    entrypoint: >
      /bin/sh -c "
      ollama serve & 
      sleep 5 && 
      ollama pull llama3.2 && 
      wait
      "
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

volumes:
  ollama_data:
